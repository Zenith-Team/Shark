name: Nightly

on:
    push:

permissions:
    contents: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    prepare:
        name: Compute tag
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.tag.outputs.tag }}
        steps:
            - name: Derive tag from commit SHA
              id: tag
              run: echo "tag=nightly-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    build:
        name: Build (${{ matrix.rid }})
        needs: prepare
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: windows-latest
                      rid: win-x64

                    - runner: ubuntu-latest
                      rid: linux-x64

                    - runner: ubuntu-latest
                      rid: linux-arm64

                    - runner: macos-latest
                      rid: osx-arm64

                    - runner: macos-latest
                      rid: osx-x64

        runs-on: ${{ matrix.runner }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up .NET 8
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Install build tools (linux-x64)
              if: matrix.rid == 'linux-x64'
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y clang zlib1g-dev

            - name: Install build tools (linux-arm64 cross-compile)
              if: matrix.rid == 'linux-arm64'
              run: |
                  sudo dpkg --add-architecture arm64

                  if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
                      sudo sed -i \
                          's/^Architectures:.*/Architectures: amd64/' \
                          /etc/apt/sources.list.d/ubuntu.sources
                  fi
                  sudo sed -i \
                      's/^deb http/deb [arch=amd64] http/' \
                      /etc/apt/sources.list 2>/dev/null || true

                  CODENAME=$(lsb_release -cs)
                  sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<EOF
                  deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main restricted universe
                  deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main restricted universe
                  EOF

                  sudo apt-get update -q
                  sudo apt-get install -y \
                      clang \
                      gcc-aarch64-linux-gnu \
                      binutils-aarch64-linux-gnu \
                      zlib1g-dev \
                      zlib1g-dev:arm64

            - name: Publish
              run: >
                  dotnet publish Shark.csproj
                  -c Release
                  -r ${{ matrix.rid }}
                  --self-contained
                  -o out

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: Shark-${{ matrix.rid }}
                  path: out/
                  retention-days: 1

    release:
        name: Publish release
        needs: [prepare, build]
        runs-on: ubuntu-latest
        steps:
            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist

            - name: Zip each platform directory
              run: |
                  mkdir zips
                  for dir in dist/*/; do
                      name=$(basename "$dir")
                      (cd "$dir" && zip -r "../../zips/${name}.zip" .)
                  done

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.prepare.outputs.tag }}
                  name: "Nightly - ${{ needs.prepare.outputs.tag }}"
                  body: |
                      Automated nightly build.
                      Commit: ${{ github.sha }}
                      Branch: ${{ github.ref_name }}
                  prerelease: true
                  draft: false
                  files: zips/*.zip
