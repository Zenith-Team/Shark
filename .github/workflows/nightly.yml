name: Nightly Build

on:
    push:

permissions:
    contents: write

jobs:
    prepare:
        name: Compute tag
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.tag.outputs.tag }}
        steps:
            - name: Derive tag from commit SHA
              id: tag
              run: echo "tag=nightly-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    build:
        name: Build (${{ matrix.rid }})
        needs: prepare
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: windows-latest
                      rid: win-x64

                    - runner: ubuntu-latest
                      rid: linux-x64

                    - runner: ubuntu-latest
                      rid: linux-arm64

                    - runner: macos-latest
                      rid: osx-arm64

                    - runner: macos-latest
                      rid: osx-x64

        runs-on: ${{ matrix.runner }}

        steps:
            - uses: actions/checkout@v4

            - name: Set up .NET 8
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Install dependencies (linux)
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y clang zlib1g-dev

            - name: Install dependencies (linux-arm64)
              if: matrix.rid == 'linux-arm64'
              run: |
                  sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

            - name: Publish
              run: >
                  dotnet publish Shark.csproj
                  -c Release
                  -r ${{ matrix.rid }}
                  --self-contained
                  -o out

            - name: Package publish directory
              shell: bash
              run: |
                  cd out
                  zip -r ../Shark-${{ matrix.rid }}.zip .

            - name: Stage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: Shark-${{ matrix.rid }}
                  path: Shark-${{ matrix.rid }}.zip
                  retention-days: 1

    release:
        name: Publish release
        needs: [prepare, build]
        runs-on: ubuntu-latest
        steps:
            - name: Download all staged zips
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.prepare.outputs.tag }}
                  name: "Nightly - ${{ needs.prepare.outputs.tag }}"
                  body: |
                      Automated nightly build.
                      Commit: ${{ github.sha }}
                      Branch: ${{ github.ref_name }}
                  prerelease: true
                  draft: false
                  files: dist/*.zip
